version: '3.9'
services:
  db:
    image: postgres:16-alpine
    container_name: desker-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: desker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d desker"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: desker-api
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/desker?sslmode=disable
      MIGRATIONS_DIR: /app/migrations
      ALLOWED_ORIGINS: http://localhost:5173

volumes:
  postgres_data:

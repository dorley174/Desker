apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "desker-backend.fullname" . }}
  labels:
    app: {{ include "desker-backend.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "desker-backend.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "desker-backend.name" . }}
    spec:
      containers:
        - name: {{ include "desker-backend.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          envFrom:
            - configMapRef:
                name: {{ include "desker-backend.fullname" . }}-config
            - secretRef:
                name: {{ include "desker-backend.fullname" . }}-secret
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
{{ toYaml .Values.resources | indent 12 }}
{{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: sqlite-data
              mountPath: {{ .Values.persistence.mountPath }}
{{- end }}
{{- if .Values.persistence.enabled }}
      volumes:
        - name: sqlite-data
          persistentVolumeClaim:
            claimName: {{ include "desker-backend.fullname" . }}-pvc
{{- end }}

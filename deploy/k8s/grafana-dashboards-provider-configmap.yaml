apiVersion: v1
kind: ConfigMap
metadata:
  name: desker-grafana-dashboards-provider
  namespace: team-6-ns
data:
  dashboards.yml: |
    apiVersion: 1

    providers:
      - name: desker-dashboards
        orgId: 1
        folder: Desker
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards

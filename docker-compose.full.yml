services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: desker-backend
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_DRIVER: sqlite
      DATABASE_URL: /app/data/desker.db
      MIGRATIONS_DIR: /app/migrations
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
    volumes:
      - desker_sqlite_data:/app/data
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_APP_BASE_PATH: /
    container_name: desker-frontend
    environment:
      API_BASE_URL: http://localhost:8080/api/v1
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  desker_sqlite_data:
